<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Review Gate</title>
    <link rel="stylesheet" href="/static/review-ui.css" />
  </head>
  <body>
    <div id="review-app" class="shell">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h1>Review Gate</h1>
          <button id="refreshButton" type="button">Refresh</button>
        </div>
        <div class="filters">
          <select id="statusFilter" aria-label="Review status">
            <option value="pending_review">Pending</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
            <option value="">All</option>
          </select>
          <select id="qualityFilter" aria-label="Quality status">
            <option value="">All quality</option>
            <option value="passed">Quality passed</option>
            <option value="failed">Quality failed</option>
          </select>
          <select id="sortFilter" aria-label="Review sort">
            <option value="newest">Newest</option>
            <option value="metadata_score_desc">Best metadata</option>
            <option value="quality_then_score">Quality + score</option>
          </select>
        </div>
        <div id="reviewList" class="review-list"></div>
      </aside>

      <main class="detail">
        <section class="hero">
          <div>
            <p id="reviewStatus" class="status">No review selected</p>
            <h2 id="reviewTitle">Select a review</h2>
            <p id="reviewMeta" class="meta"></p>
          </div>
          <div class="actions">
            <button id="approveButton" type="button">Approve</button>
            <button id="rejectButton" type="button" class="danger">Reject</button>
          </div>
        </section>

        <section class="video-panel">
          <video id="videoPreview" controls preload="metadata"></video>
        </section>

        <section class="metadata-panel">
          <h3>Metadata Variants</h3>
          <div id="selectedMetadata" class="selected-metadata"></div>
          <div class="metadata-grid">
            <div>
              <h4>Titles</h4>
              <div id="titleVariants" class="metadata-list"></div>
            </div>
            <div>
              <h4>Descriptions</h4>
              <div id="descriptionVariants" class="metadata-list"></div>
            </div>
          </div>
          <div class="metadata-grid">
            <div>
              <h4>Tags</h4>
              <div class="copy-field">
                <code id="metadataTagsCsv" class="copy-value"></code>
                <button id="copyTagsButton" type="button">Copy tags</button>
              </div>
            </div>
            <div>
              <h4>Thumbnail Text</h4>
              <div id="thumbnailTextSuggestions" class="tag-list"></div>
            </div>
          </div>
        </section>

        <section class="review-form">
          <label>
            Notes
            <input id="notesInput" type="text" placeholder="Optional review notes" />
          </label>
          <label>
            Reject reason
            <select id="reasonInput">
              <option value="wrong_image">Wrong image</option>
              <option value="bad_fact">Bad fact</option>
              <option value="bad_text">Bad text</option>
              <option value="bad_video">Bad video</option>
              <option value="bad_layout">Bad layout</option>
              <option value="bad_topic">Bad topic</option>
              <option value="bad_metric">Bad metric</option>
              <option value="other">Other</option>
            </select>
          </label>
          <label>
            Scene indexes
            <input id="scenesInput" type="text" placeholder="Example: 0, 3, 5" />
          </label>
        </section>

        <section class="grid">
          <article>
            <h3>Quality Gate</h3>
            <div id="qualityGate" class="kv"></div>
          </article>
          <article>
            <h3>Regenerate</h3>
            <div class="inline-actions">
              <button id="regenerateButton" type="button">Regenerate Scene</button>
              <label class="toggle">
                <input id="rerenderInput" type="checkbox" checked />
                Rerender video
              </label>
            </div>
            <pre id="regenerateCommand"></pre>
          </article>
        </section>

        <section>
          <h3>Scenes</h3>
          <div id="sceneList" class="scene-list"></div>
        </section>
      </main>
    </div>
    <script src="/static/review-ui.js"></script>
  </body>
</html>
