# ============================================================
# YouTube AI Automation — Docker Compose
# ============================================================

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ytbot
      POSTGRES_PASSWORD: ytbot
      POSTGRES_DB: youtube_automation
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ytbot -d youtube_automation"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── n8n (workflow automation) ──────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=changeme
      - WEBHOOK_URL=http://n8n:5678/
    volumes:
      - n8ndata:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── API server ─────────────────────────────────────────────
  db-migrate:
    image: youtube_ai_automation-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    command: ["python", "scripts/apply_db_migrations.py"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://ytbot:ytbot@postgres:5432/youtube_automation
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy

  # ── API server ─────────────────────────────────────────────
  api:
    image: youtube_ai_automation-app:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://ytbot:ytbot@postgres:5432/youtube_automation
      REDIS_URL: redis://redis:6379/0
      REMOTION_BROWSER_EXECUTABLE: /usr/bin/chromium
    volumes:
      - ./output:/app/output
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  # ── Stable public HTTPS endpoint ──────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: ["tunnel", "--no-autoupdate", "run"]
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN is required}
    depends_on:
      api:
        condition: service_started

  # ── Pipeline worker ────────────────────────────────────────
  worker:
    image: youtube_ai_automation-app:latest
    restart: unless-stopped
    command: ["python", "-m", "workers.pipeline_worker"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://ytbot:ytbot@postgres:5432/youtube_automation
      REDIS_URL: redis://redis:6379/0
      REMOTION_BROWSER_EXECUTABLE: /usr/bin/chromium
    volumes:
      - ./output:/app/output
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  # ── Telegram remote control bot ────────────────────────────
  telegram-bot:
    image: youtube_ai_automation-app:latest
    restart: unless-stopped
    command: ["python", "scripts/telegram_remote_bot.py"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://ytbot:ytbot@postgres:5432/youtube_automation
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./output:/app/output
    depends_on:
      db-migrate:
        condition: service_completed_successfully

  # ── Telegram production render worker ──────────────────────
  production-worker:
    image: youtube_ai_automation-app:latest
    restart: unless-stopped
    command: ["python", "scripts/process_production_task.py", "--loop", "--idle-sleep", "10"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://ytbot:ytbot@postgres:5432/youtube_automation
      REDIS_URL: redis://redis:6379/0
      REMOTION_BROWSER_EXECUTABLE: /usr/bin/chromium
    volumes:
      - ./output:/app/output
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  # ── Approved YouTube publishing worker ─────────────────────
  youtube-upload-worker:
    image: youtube_ai_automation-app:latest
    restart: unless-stopped
    command: ["python", "scripts/process_youtube_upload_job.py", "--loop", "--idle-sleep", "5"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://ytbot:ytbot@postgres:5432/youtube_automation
    volumes:
      - ./output:/app/output
    depends_on:
      db-migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
  redisdata:
  n8ndata:
